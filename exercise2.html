<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <title>Ex. 2</title>
</head>
<body>
    <table>
        <tbody>
            <tr>
                <td colspan="16">QUADRO DE HORÁRIOS</td>
            </tr>

            <tr>
                <td>Horário</td>
                <td colspan="3">Segunda-feira</td>
                <td colspan="3">Terça-feira</td>
                <td colspan="3">Quarta-feira</td>
                <td colspan="3">Quinta-feira</td>
                <td colspan="3">Sexta-feira</td>
            </tr>

            <tr>
                <td>6:00</td>
                <td rowspan="2" colspan="4">G</td>
            </tr>

            <tr>
                <td>6:30</td>
            </tr>

            <tr>
                <td>7:00</td>
                <td rowspan="2" colspan="3">A</td>
            </tr>

            <tr>
                <td>7:30</td>
            </tr>

            <tr>
                <td>8:00</td>
                <td rowspan="2" colspan="2">B</td>
            </tr>

            <tr>
                <td>8:30</td>
                <td rowspan="5">F</td>
            </tr>

            <tr>
                <td>9:00</td>
            </tr>

            <tr>
                <td>9:30</td>
                <td colspan="5">C</td>
            </tr>

            <tr>
                <td>10:00</td>
                <td rowspan="3" colspan="3">D</td>
            </tr>

            <tr>
                <td>10:30</td>
            </tr>

            <tr>
                <td>11:00</td>
            </tr>

            <tr>
                <td>11:30</td>
                <td rowspan="3" colspan="2">E</td>
            </tr>

            <tr>
                <td>12:00</td>
            </tr>

            <tr>
                <td>12:30</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
